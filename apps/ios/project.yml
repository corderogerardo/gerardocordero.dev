name: PawWalk
options:
  bundleIdPrefix: com.pawwalk.ios
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # Default base URL for the FastAPI backend (apps/backend), overridable per
    # scheme/config without touching source. Read at runtime via Info.plist's
    # PawWalkAPIBaseURL — see Services/APIClient.swift and the README.
    PAWWALK_API_BASE_URL: "http://localhost:8000"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  PawWalk:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PawWalk
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pawwalk.ios.PawWalk
        PRODUCT_NAME: PawWalk
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PawWalk/Info.plist
