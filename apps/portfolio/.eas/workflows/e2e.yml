# EAS Workflow: e2e "does the app boot" gate.
# Builds a simulator (.app) + emulator (.apk) with the credential-free e2e-test
# profile, then runs the Maestro smoke flow on Expo-hosted devices for BOTH
# platforms.
#
# MANUAL TRIGGER ONLY: the `maestro` job type requires a paid EAS subscription
# this account doesn't have, so on PRs it only produced a red "Subscription to
# EAS is required" check — and the builds it gates feed nothing without maestro.
# Re-enable per-PR runs by restoring the `pull_request` trigger once subscribed.
# Until then the gates are: local Maestro (apps/portfolio/.maestro/, run on a
# booted sim) + the GitHub Actions `verify` job (typecheck / lint / unit).
#
# Runs on Expo infra. Requires the EAS GitHub app connected to this repo (no token
# in CI) OR `eas workflow:run` with EXPO_TOKEN.
name: E2E smoke (app boots)

on:
  workflow_dispatch: {}

jobs:
  build_ios_e2e:
    name: Build iOS (simulator)
    type: build
    params:
      platform: ios
      profile: e2e-test

  build_android_e2e:
    name: Build Android (apk)
    type: build
    params:
      platform: android
      profile: e2e-test

  e2e_ios:
    name: Maestro E2E (iOS)
    type: maestro
    needs: [build_ios_e2e]
    params:
      build_id: ${{ needs.build_ios_e2e.outputs.build_id }}
      flow_path: ['.maestro/smoke.yml']

  e2e_android:
    name: Maestro E2E (Android)
    type: maestro
    needs: [build_android_e2e]
    params:
      build_id: ${{ needs.build_android_e2e.outputs.build_id }}
      flow_path: ['.maestro/smoke.yml']
