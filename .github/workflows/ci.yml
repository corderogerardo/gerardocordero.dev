name: CI

# The outer loop: the same checks you run locally (pnpm typecheck / pnpm lint /
# pnpm test), enforced on every push to main and every pull request so regressions
# can't merge. On a push to main — and ONLY after that loop is green — the
# `deploy-web` job ships the Expo web export to Cloudflare Pages (the live site at
# gerardocordero.dev). PRs run the loop but never deploy.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup reads the version from package.json "packageManager"
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # Ship the live web build. `needs: verify` is the gate — this job cannot start
  # until typecheck + lint + test all pass, so a red main can never reach production.
  # The `if` restricts it to actual pushes to main (PRs and other branches skip it).
  deploy-web:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Expo Router static export → apps/portfolio/dist. The build also copies
      # public/_redirects (SPA fallback) and public/_headers (security headers)
      # into dist so Cloudflare Pages applies them.
      - name: Build web export
        working-directory: apps/portfolio
        run: npx expo export --platform web

      # Direct Upload to the existing Pages project. --branch=main targets the
      # production branch, so this updates the apex (gerardocordero.dev) plus the
      # www and app custom domains. Auth comes from two repo secrets:
      #   CLOUDFLARE_API_TOKEN   — a token scoped to "Cloudflare Pages: Edit"
      #   CLOUDFLARE_ACCOUNT_ID  — the account id (already set)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/portfolio
          # Force pnpm. With no lockfile inside apps/portfolio the action would
          # fall back to npm, and `npm i wrangler` chokes on the workspace:*
          # protocol in this package's deps (EUNSUPPORTEDPROTOCOL). pnpm speaks
          # workspace:, so its wrangler install succeeds.
          packageManager: pnpm
          command: pages deploy dist --project-name=gerardocordero-portfolio --branch=main

  # Ship apps/ios-prep to its own Pages project (ios-prep) — but ONLY when this
  # push actually changed files under apps/ios-prep (or on a manual run). Gated
  # behind `verify`, same as the portfolio deploy, so a red main can't ship.
  deploy-ios-prep:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/ios-prep
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/ios-prep/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/ios-prep — skipping deploy."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build static export
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/ios-prep
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ios-prep
          packageManager: pnpm
          command: pages deploy out --project-name=ios-prep --branch=main

  # Same pattern for apps/reactnative-prep -> Pages project reactnative-prep.
  deploy-reactnative-prep:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/reactnative-prep
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/reactnative-prep/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/reactnative-prep — skipping deploy."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build static export
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/reactnative-prep
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/reactnative-prep
          packageManager: pnpm
          command: pages deploy out --project-name=reactnative-prep --branch=main

  # Same pattern for apps/android-prep -> Pages project android-prep
  # (android.gerardocordero.dev).
  deploy-android-prep:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/android-prep
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/android-prep/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/android-prep — skipping deploy."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build static export
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/android-prep
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/android-prep
          packageManager: pnpm
          command: pages deploy out --project-name=android-prep --branch=main

  # Same pattern for apps/nest-prep -> Pages project nest-prep
  # (nestjs.gerardocordero.dev).
  deploy-nest-prep:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/nest-prep
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/nest-prep/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/nest-prep — skipping deploy."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build static export
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/nest-prep
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/nest-prep
          packageManager: pnpm
          command: pages deploy out --project-name=nest-prep --branch=main

  # Same pattern for apps/nextjs-prep -> Pages project nextjs-prep
  # (nextjs.gerardocordero.dev).
  deploy-nextjs-prep:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/nextjs-prep
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/nextjs-prep/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/nextjs-prep — skipping deploy."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build static export
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/nextjs-prep
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/nextjs-prep
          packageManager: pnpm
          command: pages deploy out --project-name=nextjs-prep --branch=main

  # Validates apps/learn's lesson content (syntax, schema, and that every
  # exercise's own solution passes its own checks) whenever it changes. Same
  # change-detection pattern as the deploy-* jobs below, but also runs on PRs
  # (unlike deploy) since it's a check, not a deploy — PRs use the PR base SHA
  # as the diff point instead of `github.event.before`. Zero-dependency
  # script, so no pnpm install — just Node to run it.
  validate-learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/learn
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -qE '^apps/learn/'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No changes under apps/learn — skipping validation."
            fi
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/learn/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/learn — skipping validation."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
      - name: Validate lessons
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/learn
        run: node tools/validate.mjs

  # Compiles apps/ios (the SwiftUI reference app extracted from the iOS
  # course) whenever it changes. Same change-detection idiom as
  # validate-learn — runs on PRs too, since it's a check, not a deploy.
  # macos-latest for Xcode/xcodegen; the project is XcodeGen-based, so CI
  # regenerates PawWalk.xcodeproj rather than committing it.
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/ios
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -qE '^apps/ios/'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No changes under apps/ios — skipping build."
            fi
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/ios/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/ios — skipping build."
          fi
      - name: Install xcodegen
        if: steps.detect.outputs.changed == 'true'
        run: brew install xcodegen
      - name: Generate Xcode project
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build for iOS Simulator
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/ios
        run: xcodebuild -project PawWalk.xcodeproj -scheme PawWalk -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

  # Compiles apps/android (the Jetpack Compose reference app extracted from
  # the Android course) whenever it changes. This IS the compile gate for that
  # app — there's no local Android SDK in this dev environment, so `gradlew
  # assembleDebug` only ever runs here, on a GitHub-hosted ubuntu-latest
  # runner (which ships the Android SDK). Same change-detection idiom as
  # validate-learn above.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/android
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | grep -qE '^apps/android/'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No changes under apps/android — skipping build."
            fi
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/android/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/android — skipping build."
          fi
      - uses: actions/setup-java@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          distribution: temurin
          java-version: "17"
      - name: Build debug APK
        if: steps.detect.outputs.changed == 'true'
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

  # Same pattern for apps/learn -> Pages project academy
  # (academy.gerardocordero.dev). Unlike the prep sites this is a pure static,
  # no-build site, so there's no `pnpm build`/`pnpm install` step — we deploy the
  # directory itself. Pages auto-ignores dotfiles (`.claude`) and node_modules,
  # so nothing extra needs excluding.
  deploy-learn:
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes under apps/learn
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qE '^apps/learn/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes under apps/learn — skipping deploy."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 20
      # No package.json in apps/learn, so wrangler-action installs wrangler via
      # npm here — safe because there are no workspace:* deps to choke on (that's
      # the failure the portfolio deploy above avoids by forcing pnpm).
      - name: Deploy to Cloudflare Pages
        if: steps.detect.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/learn
          command: pages deploy . --project-name=academy --branch=main
