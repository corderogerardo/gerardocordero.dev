name: Release

# Cutting a release = pushing a v* tag (see apps/portfolio/scripts/release.mjs).
# This always creates the GitHub Release. The EAS production build is opt-in:
# set repo variable RELEASE_BUILDS=true and secret EXPO_TOKEN to enable it, so
# the job never fails just because the token isn't configured.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --verify-tag --generate-notes

  eas-build:
    needs: [github-release]
    if: ${{ vars.RELEASE_BUILDS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build (production, both platforms)
        working-directory: apps/portfolio
        run: eas build --platform all --profile production --non-interactive --no-wait
